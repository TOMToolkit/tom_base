{% load bootstrap4 %}
<div class="row">
{% for field in form %}
  {% if field.name != 'survey' and field.name != 'object_id' and field.name != 'query_name' and field.name != 'query_save' and field.name != 'data_service' %}
    <div class="col-md-6">{% bootstrap_field field %}</div>
  {% endif %}
{% endfor %}
</div>
