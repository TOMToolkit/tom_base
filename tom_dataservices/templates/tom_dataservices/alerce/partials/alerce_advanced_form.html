{% load bootstrap4 dataservices_extras %}
<div class="row">
{% for field in form %}
  {% if field|is_cfield %}
    <div class="col-md-6">{% bootstrap_field field %}</div>
  {% endif %}
{% endfor %}
</div>
<h2>Location Filters</h2>
<div class="row">
  <div class="col-md-4">{% bootstrap_field form.ra %}</div>
  <div class="col-md-4">{% bootstrap_field form.dec %}</div>
  <div class="col-md-4">{% bootstrap_field form.radius %}</div>
</div>
