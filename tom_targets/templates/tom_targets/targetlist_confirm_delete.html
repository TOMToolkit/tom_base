{% extends 'tom_common/base.html' %}
{% load django_bootstrap5 %}
{% block title %}Confirm delete{% endblock %}
{% block content %}
<form method="post">{% csrf_token %}

    {% bootstrap_button "Confirm" button_type="submit" button_class="btn btn-primary" %}
</form>
{% endblock %}
