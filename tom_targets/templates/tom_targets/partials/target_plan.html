{% load django_bootstrap5 %}
<div id="plan-panel">
  <form action="{% url 'targets:detail' target.id %}" method="GET" class="form">
    {% csrf_token %}
    {% bootstrap_form form %}
    {% bootstrap_button "Plan" button_type="submit" button_class="btn btn-primary" value="Plan" %}
  </form>
  {{ visibility_graph|safe }}
</div>
