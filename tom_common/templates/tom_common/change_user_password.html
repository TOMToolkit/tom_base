{% extends 'tom_common/base.html' %}
{% load django_bootstrap5 %}
{% block title %}Change password{% endblock %}
{% block content %}
<form action="{% url 'admin-user-change-password' view.kwargs.pk %}" method="POST">
{% csrf_token %}
{% bootstrap_form form %}
{% bootstrap_button "Change Password" button_type="submit" button_class="btn btn-primary" %}
</form>
{% endblock %}
