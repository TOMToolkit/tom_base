<div style="cursor:pointer;"
     title="Click to reveal"
     onclick="var i=this.querySelector('input'); i.type = i.type === 'password' ? 'text':'password';">
    <input
        type="password"
        readonly
        value="{{ value }}"
        class="form-control-plaintext p-0"
        style="display:inline; width:auto; cursor:pointer;"
    /> <i class="fa fa-eye"></i>
</div>
